name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Typecheck
        run: npm run check
      - name: Tests
        run: npm run test
      - name: Build front-end
        run: npm run build

  deploy:
    # Deploys main to Cloudflare after tests pass.
    # Skipped silently until the CLOUDFLARE_API_TOKEN repository secret exists,
    # so the first push to GitHub is green even before Cloudflare is wired up.
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Cloudflare credentials
        id: creds
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping deploy. Add it in Settings → Secrets → Actions to enable automatic deployment."
          fi
      - uses: actions/setup-node@v4
        if: steps.creds.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.creds.outputs.ready == 'true'
      - run: npm run build
        if: steps.creds.outputs.ready == 'true'
      - name: Apply D1 migrations
        if: steps.creds.outputs.ready == 'true'
        run: npx wrangler d1 migrations apply nexian_talent --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Worker
        if: steps.creds.outputs.ready == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
